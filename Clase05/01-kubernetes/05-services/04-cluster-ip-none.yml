apiVersion: v1
kind: Service
metadata:
  name: svc-web
spec:
  clusterIP: None
  selector:
    env: dev
    app: frontend
  ports:
    - port: 4000
      targetPort: 3000
      protocol: TCP
      name: port-ingest-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    env: dev
    app: frontend
spec:
  replicas: 5
  selector:
    matchLabels:
      env: dev
      app: frontend
  template:
    metadata:
      labels:
        env: dev
        app: frontend
    spec:
      containers:
        - name: web
          image: python:3.7-alpine
          command:
            [
              "sh",
              "-c",
              "echo 'Home from Python container' > index.html && python -m http.server 3000",
            ]
